%YAML:1.0

# ============================================================================
# ██  级联检测器配置  ██
# ============================================================================
# 赛前必改参数: enemy_color, enemy_side, preset_stability_tier → config/enemy.yaml
#
# 整体流程:
#   第1层 YOLO (全图→检测无人机) → 敌/友方过滤 → ROI裁剪(无人机上方)
#   → 第2层 YOLO (ROI→检测激光模块) → 后过滤(宽高比/面积/灯带拒绝)
#   → Kalman跟踪器(帧间关联+轨迹) → 比赛分析器(P值/稳定性/阶段)
#
# ★ 激光工作方式: 上电即常亮，不存在"开不开火"的概念 ★
# 系统职责: 给云台输出瞄准坐标 + 瞄准质量评估
#
# ── 第1层: 无人机检测 ──
# 输入: 全帧图像 (640×640 缩放)
# 输出: 无人机 bbox 列表
# ── 模型路径 ──
layer1_engine: "../src/detect/model/export/layer1_plane_fp16.engine"
layer2_engine: "../src/detect/model/export/layer2_laser_rx_fp16.engine"

layer1_input_size: 640               # YOLO 输入分辨率
layer1_conf: 0.50                    # 置信度阈值
layer1_iou: 0.45                     # NMS IoU 阈值
layer1_class_names: [ "plane" ]      # 类别名

# ── 敌/友方无人机过滤 ──
# enemy_color 和 enemy_side 在 config/enemy.yaml 中指定
enemy_x_threshold: 0.5           # 归一化x坐标阈值 (0.0~1.0)

# ── ROI 裁剪策略 ──
# 无人机可见机体（不含起落架）高约 20-30cm。
# 激光检测模块安装在刚性保护杆上，杆顶距桨叶重心平面 350±50mm，
# 桨叶重心平面大约在可见机体顶部附近。
# 所以模块在 bbox 顶部上方约 20-30cm ≈ 1.0倍 bbox 高度。
#
# roi_top_extend: bbox 顶部向上延伸多少 (bbox高度的倍数)
# roi_bottom_extend: bbox 顶部向下延伸多少 (俯视角时目标可能与机体重叠)
# roi_width_scale: 水平方向相对 bbox 宽度的缩放比
# roi_min_size: ROI 最小边长 (像素), 太小则放弃
roi_top_extend: 1.0
roi_bottom_extend: 0.3
roi_width_scale: 1.2
roi_min_size: 64

# ── 第2层: 激光检测模块检测 ──
# 输入: ROI 裁剪图 (256×256 缩放), 每个无人机上方一个 ROI
# 输出: 激光检测模块 bbox
#
# 训练模式:
#   多类 (当前): blue/purple/red 激光模块，颜色和形状特征
#   经典 CV 灯带拒绝在两种模式下都生效，形成多层防御。
layer2_input_size: 256               # 较大输入，保留更多细节
layer2_conf: 0.40                    # 置信度阈值 (模块较小，适当放低)
layer2_iou: 0.45                     # NMS IoU 阈值
layer2_class_names: [ "blue", "purple", "red" ]   # 3类激光模块

# ── 后过滤: 宽高比 + 面积比 ──
# 激光检测模块外形: 72mm × 50mm × 50mm, 检测区域 φ42mm → 近正方形, 宽高比 ~1.0-1.5
# 灯带: 细长条状 (>1500mm), 宽高比 >> 2.0
# 面积比: 模块在 ROI 中占比应合理 (太小=噪声, 太大=误检)
laser_rx_max_aspect_ratio: 2.5       # 宽高比超过此值 → 拒绝 (灯带或误检)
laser_rx_min_area_ratio: 0.002       # bbox面积 / ROI面积 < 此值 → 太小, 拒绝
laser_rx_max_area_ratio: 0.5         # bbox面积 / ROI面积 > 此值 → 太大, 拒绝

# ── 经典 CV 灯带拒绝（不需要标注数据）──
#
# ★ 关键事实 ★
#   1. 航行外观灯(灯带): LED灯带总长 >1500mm, 朝上安装, 队伍色(红/蓝),
#      40mm外照度 150~500Lux, 形状各队不同(折线/V形/平行四边形/交叉等)
#   2. 激光检测模块: 也有"灯板"和"视觉特征区域", 也发队伍色光!
#      模块外形 72×50×50mm, 检测区域 φ42mm (近圆形/正方形)
#   3. 灯带距激光模块最外边沿 ≥250mm (S111规则)!
#      ★ 注意: 这是俯视图上的水平距离, 不是竖直距离! ★
#      灯带安装在无人机上表面的水平面上 (平行于地面),
#      激光检测模块安装在刚性杆顶部, 同样从无人机上方伸出。
#      两者在俯视图上水平间隔 ≥250mm。
#      从前哨站相机（从下/侧面看）的视角, 灯带和模块在图像中的角分离
#      取决于拍摄距离和相机仰角。近距离时角分离大, 远距离时可能较小。
#      → 在 ROI 裁剪中两者通常有间隔, 但远距离时可能在同一检测框中
#
# ★ 区分方法: 逐轮廓形状分析 ★
#   两者都发队伍色光, 但形状截然不同:
#     灯带: 细长线条 (aspect ratio > 2.5, 圆形度低)
#     模块: 紧凑光斑 (φ42mm, 近圆形, 圆形度 > 0.3, aspect < 2.0)
#   算法:
#     1) 在检测 bbox 内做 HSV 颜色掩码
#     2) 找轮廓, 逐个分析圆形度和宽高比
#     3) 如果存在任何「紧凑轮廓」→ 保留 (可能是激光模块)
#     4) 如果只有「细长轮廓」且颜色占比高 → 拒绝为灯带
#
# ★ 灯带亮度担忧 ★
#   灯带 150-500Lux 非常亮, 且密集排列, 可能形成较大的明亮区域。
#   但灯带是条状排列, 即使密集也是线性延伸, 而模块是集中的圆形光斑。
#   如果灯带密集到形成紧凑光斑, 说明距离很远/很小, 此时 250mm 间距
#   在画面中也很小, 不太可能出现在同一个 Layer2 检测框中。
#   TODO: 实际比赛验证, 可能需要根据真实灯带图案调整阈值。
#
# enemy_color: 敌方队伍颜色 ("blue" 或 "red")
#   蓝方 HSV H∈[90,130], 红方 H∈[0,15]∪[165,180]
# strip_reject_enabled: 是否启用经典 CV 灯带拒绝
# strip_color_ratio_threshold: bbox 内队伍色像素占比 ≥ 此值 → 有灯带嫌疑
# strip_min_saturation: HSV 饱和度 S 最低阈值, 排除低饱和度的非 LED 区域
# strip_min_value: HSV 明度 V 最低阈值, 排除暗区域
# strip_contour_elongation: 轮廓最小外接矩形的长宽比 > 此值 → 视为细长条状
strip_reject_enabled: true
strip_color_ratio_threshold: 0.25    # bbox内 ≥25% 为队伍色像素
strip_min_saturation: 80             # HSV S ≥ 80 (0-255)
strip_min_value: 80                  # HSV V ≥ 80 (0-255)
strip_contour_elongation: 2.5        # 最小外接矩形长/宽 > 2.5 视为细长

# ── 目标跟踪器 (Kalman + IoU 关联) ──
# 类似 DeepSORT 的帧间关联跟踪器，维护激光模块的运动轨迹。
# 激光模块与上一帧位置强相关（固定在无人机刚性杆上，与机体相对静止），
# 跟踪器的核心价值:
#   1. 检测短暂丢失时，用 Kalman 预测维持跟踪位置
#   2. 帧间关联: 区分稳定目标 vs 干扰闪烁 (确认需连续 3 帧命中)
#   3. 速度估计: Kalman 滤波器输出目标速度，辅助运动补偿
#   4. 轨迹日志: 每局结束保存完整轨迹，用于赛后复盘分析
#
# Kalman 状态向量: [cx, cy, vx, vy, w, h] (中心坐标, 速度, 宽高)
# 匀速运动模型: cx' = cx + vx, cy' = cy + vy
# 测量向量: [cx, cy, w, h] (从检测结果获取)
tracker:
  max_distance: 100.0          # 关联最大中心距离 (像素), 超过此距离不匹配
  min_iou: 0.1                 # 关联最小 IoU, IoU 低于此值且距离也超限 → 不匹配
  hits_to_confirm: 3           # 连续命中次数达到此值 → 轨迹从"暂定"升级为"确认"
  max_age: 15                  # 已确认轨迹连续丢失此帧数 → 删除轨迹
  tentative_max_age: 3         # 暂定轨迹连续丢失此帧数 → 删除轨迹
  process_noise_pos: 4.0       # Kalman 位置过程噪声标准差 (像素)
  process_noise_vel: 10.0      # Kalman 速度过程噪声标准差 (像素/帧)
  process_noise_size: 2.0      # Kalman 尺寸过程噪声标准差 (像素)
  measurement_noise: 4.0       # Kalman 测量噪声标准差 (像素)
  # NIS 发散检测 (借鉴 sp_vision 卡方检验)
  nis_check: 1                 # 启用 NIS (Normalized Innovation Squared) 发散检测
  nis_threshold: 9.488          # 卡方检验阈值 (自由度4, 95%置信度)
  nis_window: 10               # 滑窗大小 (帧)
  nis_fail_ratio: 0.4          # 滑窗内失败率超过此值 → 判定为发散, 重置轨迹
  log_trajectory: 1            # 是否在程序退出时保存轨迹日志 (0=否, 1=是)
  trajectory_log_path: "trajectory_log.yaml"  # 轨迹日志文件路径

# ── 相对偏移位置预测 ──
# ★ 核心问题: 第3次锁定后，检测模块停止发光，无法再直接视觉检测！★
# 解决方案: 利用前两次成功锁定时记录的「模块相对无人机 bbox 的归一化偏移」，
# 在模块不发光时，只要还能检测到无人机本体，就能预测模块位置。
#
# 原理: 激光检测模块固定在刚性杆上，与无人机机体保持相对静止 (S192规则)。
# 归一化偏移 = (模块中心 - 无人机bbox中心) / 无人机bbox尺寸
# 这个偏移在不同距离下保持一致（透视缩放被归一化抵消）。
#
# 使用时机:
#   - 第3次锁定后模块停止发光（P值规则）
#   - 检测暂时丢失但无人机仍在画面中
#   - 灯带干扰导致模块被误拒时的备用定位
#
# offset_min_samples: 至少积累多少次有效检测才开始使用偏移预测
# offset_ema_alpha: 偏移量的 EMA 平滑系数 (0→纯历史, 1→纯当前)
# offset_predict_max_frames: 偏移预测最多持续多少帧（超过则放弃）
offset_predict_enabled: true
offset_min_samples: 10               # 至少 10 次有效检测才信任偏移估计
offset_ema_alpha: 0.1                # 偏移估计平滑系数，取小值保持稳定
offset_predict_max_frames: 150       # 偏移预测最多持续 150 帧 (~5s@30fps)

# ── 输出 ──
# 最终输出: 激光检测模块中心坐标 (全帧坐标系)
# 来源优先级:
#   1. 直接检测 (第2层YOLO检测到 + 过滤通过 + 跟踪器确认)
#   2. Kalman预测 (检测短暂丢失，跟踪器用上一帧速度预测)
#   3. 偏移预测 (长时间丢失/模块不发光，用无人机bbox+偏移推算)
# 只返回敌方侧的检测结果。

# ============================================================================
# ██  比赛场景配置  ██
# ============================================================================

# ── 场地物理参数 ──
# 战场: 28m × 15m, 围挡高度 2.4m
# 雷达基座平台高度 ~2.5m, 平台面积 3.4m × 1.16m, 围栏 1.1m
# 相机安装在雷达基座上，高度 ~3.2-3.5m
field_length: 28.0                    # m, 场地长边
field_width: 15.0                     # m, 场地短边
fence_height: 2.4                     # m, 围挡高度
radar_platform_height: 2.5            # m, 雷达基座平台离地高度
camera_height: 3.35                   # m, 相机离地高度（基座 + 传感器架）
camera_x_on_width: 7.5                # m, 相机在短边上的位置（约中间偏移）

# ── 无人机飞行参数 ──
# R49: 最低点距地面 ≥ 1.5m, 最高不超围挡 2.4m
# 实际飞行高度: 2.0-2.4m
# 安全绳长度: 2.4m, 卡环距己方场边 ~14m
# 无人机在钢丝绳下方飞行，沿细长平行四边形路径
drone_flight_height_min: 2.0          # m, 典型飞行高度下限
drone_flight_height_max: 2.4          # m, 典型飞行高度上限
drone_min_legal_height: 1.5           # m, 规则允许最低高度 (R49)
safety_rope_length: 2.4               # m, 安全绳长度
rope_clip_distance: 14.0              # m, 卡环距己方场边距离
drone_visible_body_cm: 25.0           # cm, 可见机体高度（不含起落架, 20-30cm）

# ── 激光锁定机制 (P值规则) ──
# 仅在敌方空中支援期间，己方激光发射装置上电。
# P值范围 0~P0, 达到 P0 时触发锁定，锁定敌方发射机构 45s, P归零。
# 每局最多 3 次锁定。
#
# ★ P值增长公式 ★
#   连续照射时，每 0.1s 判定一次:
#     第1次判定: P += 1
#     第2次判定: P += 2
#     第n次判定: P += n  (n为从1开始递增的连续判定计数器)
#   累加: 1+2+...+n = n(n+1)/2
#
#   第1次锁定 P0 = 50:
#     需要 n(n+1)/2 ≥ 50 → n ≥ 10 → 至少连续照射 10×0.1 = 1.0 秒
#   第2次锁定 P0 = 100 (检测区域缩小到原来的 3/5):
#     需要 n(n+1)/2 ≥ 100 → n ≥ 14 → 至少连续照射 14×0.1 = 1.4 秒
#   第3次锁定 P0 = 100 (检测区域缩小到原来的 1/5, ★模块停止发光★):
#     需要 n(n+1)/2 ≥ 100 → n ≥ 14 → 至少连续照射 14×0.1 = 1.4 秒
#
# ★ P值衰减 ★
#   未被照射时，P 以 0.5/秒 的速率衰减，直到归零。
#
# ★★ 极其关键 ★★
#   任何 <0.1s 的照射中断 → 连续判定计数器 n 归零，重新从 1 开始!
#   这意味着即使已经累积了一些P值，一次抖动中断就会大幅降低后续增速。
#   所以连续性比精确性更重要！宁可略偏也不能中断照射。
#
# ★ 第3次锁定后的挑战 ★
#   检测区域缩小到 1/5 → φ42mm × 1/5 ≈ φ8.4mm, 极难命中
#   模块停止发光 → 无法直接视觉检测, 必须依赖:
#     a) 前两次成功时记录的「模块相对无人机的偏移量」进行推算
#     b) 无人机本体仍然可检测 (灯带仍亮着)
#     c) 偏移量在短时间内保持稳定 (模块固定在刚性杆上)
p0_first: 50
p0_second: 100
p0_third: 100
p_decay_rate: 0.5                     # P/s, 未照射时衰减速率
p_judge_interval: 0.1                 # s, 判定周期
lock_duration: 45.0                   # s, 锁定持续时间
max_locks_per_match: 3

# ── 空中支援时间 ──
# 空中机器人每局有时间限制的空中支援时间。
# 初始 30 秒, 之后每 1 分钟增加 20 秒。
# 支援期间: 有图传画面, 不接触停机坪时可发射弹丸。
# 支援结束后: 每秒消耗 1 金币，持续飞行会拖累经济。
# 我方激光只在敌方空中支援期间上电。
air_support_initial: 30.0             # s
air_support_increment: 20.0           # s, 每分钟增加
air_support_increment_interval: 60.0  # s

# ============================================================================
# ██  无人机稳定性分档  ██
# ============================================================================
# 赛前由操作手根据对手信息预设，比赛中系统自动观察修正。
# 基准线在 2-3 档之间。同一学校不同飞机、不同场次可能不同，以实际为准。
#
# 档位 1: 极致丝滑，几乎不抖。顶级学校，偶尔轻微晃动。
# 档位 2: 正常水平，还可以但不完美，偶有小幅抖动。
# 档位 3: 经常抖动，不够稳定，跟踪有一定难度。
# 档位 4: 严重抖动，幅度大，跟踪非常困难。
#
# 每档参数:
#   shake_threshold_px: 帧间位移阈值(像素), 超过视为抖动
#   smooth_alpha: EMA平滑系数 (0→纯历史, 1→纯当前), 越抖越小
#   hold_frames: 丢失目标后保持预测的帧数, 越抖越长
#   min_continuous_s: 认为"稳定照射"的最短持续时间阈值
#   aim_strategy: 瞄准策略类型
#     "precise"   — 精确跟踪, 激光直指目标中心
#     "track"     — 正常跟踪, 小幅预测补偿
#     "predict"   — 预测跟踪, 加大平滑和预测力度
#     "opportune" — 瞄准质量评估: 目标不稳定时认为照射无效
#
# ── 稳定性档位预设 ──
# preset_stability_tier 在 config/enemy.yaml 中指定

# ── 档位 1: 极致丝滑 ──
tier1_shake_threshold_px: 3.0
tier1_smooth_alpha: 0.7
tier1_hold_frames: 3
tier1_min_continuous_s: 0.08
tier1_aim_strategy: "precise"

# ── 档位 2: 正常水平 ──
tier2_shake_threshold_px: 6.0
tier2_smooth_alpha: 0.5
tier2_hold_frames: 5
tier2_min_continuous_s: 0.08
tier2_aim_strategy: "track"

# ── 档位 3: 经常抖动 ──
tier3_shake_threshold_px: 12.0
tier3_smooth_alpha: 0.3
tier3_hold_frames: 8
tier3_min_continuous_s: 0.06
tier3_aim_strategy: "predict"

# ── 档位 4: 严重抖动 ──
tier4_shake_threshold_px: 25.0
tier4_smooth_alpha: 0.2
tier4_hold_frames: 12
tier4_min_continuous_s: 0.05
tier4_aim_strategy: "opportune"

# ── 自适应校准参数 ──
# 系统开始跟踪后，观察 calibration_window_s 秒内的抖动幅度，
# 然后与各档 shake_threshold 对比，自动修正当前档位。
# 之后每 recalibrate_interval_s 秒重新评估一次。
# tier_change_cooldown_s: 连续两次变档的最小间隔
calibration_window_s: 3.0
recalibrate_interval_s: 10.0
tier_change_cooldown_s: 5.0

# ============================================================================
# ██  飞行阶段检测  ██
# ============================================================================
# 无人机行为阶段:
#   IDLE       — 停在停机坪上，未起飞或已降落断电
#   TAKEOFF    — 起飞上升中（停机坪高度 → 飞行高度）
#   CRUISING   — 沿钢丝绳路径飞行中（前往前哨站）
#   ATTACKING  — 接近前哨站，悬停或缓慢移动中击打 ★最佳照射时机★
#   RETURNING  — 返回停机坪途中
#   LANDING    — 降落到停机坪
#
# 阶段判据:
#   - 位置变化速度 (px/frame)
#   - 在画面中的x位置 (靠近前哨站=靠近画面中央/左侧)
#   - bbox大小变化 (接近/远离)
#
# ATTACKING 阶段是照射的黄金时机：
#   无人机可能悬停在前哨站附近，此时最稳定，必须把握住。
phase_idle_max_speed_px: 2.0          # px/frame, 低于此视为静止(停机坪)
phase_cruise_min_speed_px: 5.0        # px/frame, 高于此视为巡航
phase_attack_max_speed_px: 8.0        # px/frame, 低于此且在前方区域视为攻击
phase_attack_x_threshold: 0.6         # 归一化x, 无人机中心超过此值视为在前方(靠近前哨站)
phase_takeoff_bbox_grow_rate: 0.05    # bbox高度增长率/帧, 超过视为起飞

# ============================================================================
# ██  比赛日志  ██
# ============================================================================
# 输出到日志文件，供赛后分析。
# 内容: 时间戳、飞行阶段、当前档位、实测抖动值、P值估计、
#        检测置信度、目标位置、瞄准质量等。
log_enabled: true
log_file: "match_log.yaml"
log_interval_ms: 100                  # 日志写入间隔 (ms)
