%YAML:1.0

# ============================================================================
# 控制器参数 — PID + 前馈 + 阻尼 + 搜索 + 启动
# ============================================================================

# ── 方向符号 ──
yaw_sign: -1.0
pitch_sign: -1.0

# ── PID ──
kp: 3.0
deadband_px: 1.0
max_angle_rate: 180.0
lowpass_alpha: 0.7
ctrl_dt_nominal_ms: 10.0
ctrl_dt_min_ms: 1.0
ctrl_dt_max_ms: 100.0

# ── 前馈 ──
use_velocity_ff: 1
ff_alpha: 0.5
ff_rate_max: 150.0
ff_dt_max_ms: 80.0

# ── 阻尼 ──
# "meas" = 测量速度(更快)  "gimbal" = 云台角速度反馈(更稳)
use_damping: 1
damping_source: "meas"
damping_kd: 0.008
damping_dt_max_ms: 120

# ── 丢失目标微扫 + 安全策略 ──
# yaw: 小幅慢扫
# pitch: 渐进回归到目标常出现的位置(EMA记忆), 不允许极端抬头/低头
scan_enable: 1
scan_radius_deg: 0.8            # yaw 微扫幅度(度) [兼容旧字段]
scan_rate_hz: 0.12              # yaw 微扫频率(Hz) [兼容旧字段]
scan_enter_delay_ms: 180
scan_reacq_confirm_frames: 2
lost_yaw_scan_amp: 0.5          # 丢失时 yaw 扫描幅度(度), 很小
lost_yaw_scan_rate: 0.08        # 丢失时 yaw 扫描频率(Hz), 比正常慢
lost_pitch_home: 0.0            # 丢失后 pitch 回归目标(度), 0=水平
lost_pitch_return_rate: 5.0     # pitch 回归速度(deg/s), 慢慢回
lost_pitch_max: 15.0            # pitch 绝对上限(度), 防极端抬头
lost_pitch_min: -15.0           # pitch 绝对下限(度), 防极端低头
lost_pitch_use_ema: 1           # 用EMA记住目标常出现的pitch
lost_pitch_ema_alpha: 0.02      # EMA系数(越小越稳定)

# ── 指令限幅 (防止绝对值突变导致电控疯掉) ──
cmd_max_yaw_step_deg: 5.0       # 单帧 yaw 最大变化(度)
cmd_max_pitch_step_deg: 3.0     # 单帧 pitch 最大变化(度)

# ── 启动策略 ──
startup_check_frames: 5
startup_home_pitch: 0.0
startup_home_yaw: 0.0
startup_prep_ms: 1000
startup_hold_ms: 200
startup_home_ms: 600
startup_validate_ms: 200
startup_min_state_frames: 1
startup_require_home: 1
startup_home_tol_deg: 1.0
startup_home_max_extra_ms: 1000
startup_validate_first: 1
startup_allow_early_exit: 1

# ── 延迟补偿 (借鉴 sp_vision 弹道补偿思路) ──
# 激光是光速无需弹道补偿, 但系统延迟 (检测+通信+云台) 需要补偿
# 用 Kalman 速度预测目标在 delay 后的位置, 提前瞄过去
delay_compensate: 1
system_delay_ms: 10.0             # 总软件延迟 (ms), 不含云台机械延迟
                                  # 实测方法: 看日志 STAT_CTRL meas_age_ms 的值
                                  # 如需加云台延迟, 问电控 PID 阶跃响应时间

# ── 自适应增益 ──
# 远距离 bbox 小, 像素误差小但角度误差不变, 需要更大 kp
# bbox 面积在 [kp_far_area, kp_near_area] 之间线性插值
adaptive_kp: 0                    # 0=关闭用固定kp, 1=启用自适应
kp_near: 3.0                     # bbox > 8000px² 时的 kp (近距离)
kp_far: 6.0                      # bbox < 800px² 时的 kp (远距离)
kp_near_area: 8000.0             # 近距离 bbox 面积阈值 (px²)
kp_far_area: 800.0               # 远距离 bbox 面积阈值 (px²)

# ── 相机内参 ──
# 从 config/camera.yaml 的 camera_matrix 读取 (fx, fy, cx, cy)
# 换镜头后需同步更新 camera.yaml

# ── 相机-云台外参 (sp_vision 标定) ──
R_camera2gimbal: [0.01564436347592291, -0.0094715160352174654, 0.99983275815279637,
                  -0.99986472826106809, 0.0049295109553235206, 0.015691561463454833,
                  -0.0050773094108242916, -0.99994299352799898, -0.0093931157456294424]
t_camera2gimbal: [0.075368216619198847, 0.0014648496765427086, 0.00088236758196906485]

# ── 激光同轴补偿 (标定程序 laser_boresight 输出) ──
# 物理偏移 (视差, 距离相关): 近距离偏差大, 远距离趋零
laser_offset_y: 0.029600     # 米, 激光在相机下方的物理偏移
laser_offset_x: 0.000318     # 米, 激光在相机右侧的物理偏移
# 角度偏差 (常数项, 距离无关): 激光和相机光轴不平行
# 来源: calib_20260501_054240.log (1587样本, RMS_u=0.11px, RMS_v=0.50px)
boresight_yaw_deg: 0.4176    # 度, 激光-相机 yaw 角度偏差
boresight_pitch_deg: 1.3838  # 度, 激光-相机 pitch 角度偏差

# ── 目标物理尺寸 (S190 激光检测模块, 制作规范手册 V1.4.0) ──
# 整体: 72mm(高) × 50mm(宽) × 50mm(深), 检测区域 φ42mm, 中空 φ20mm
target_height_m: 0.050    # 米, 模块高度 (50mm)
target_width_m:  0.050    # 米, 模块宽度 (50mm, 正六棱柱外接)
target_detect_diameter_m: 0.042  # 米, 检测区域直径 (φ42mm)

